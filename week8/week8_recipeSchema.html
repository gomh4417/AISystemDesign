<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>버터떡 레시피 생성기</title>
    <style>

      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }

      body {
        font-family: sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
      }

      #recipeBtn {
        padding: 10px 20px;
        margin-top: 40px;
        font-size: 16px;
        cursor: pointer;
        background-color: #e4e4e4;
        border: none;
        border-radius: 8px;
      }

      #name {
        font-size: 24px;
      }

      #ingredients {
        color: #444444;
        font-weight: 200;
        margin-bottom: 20px;
        width: 720px;
        text-align: center;
      }

      #process {
        width: 560px;
        text-align: center;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

    </style>
  </head>
  <body>
    <button id="recipeBtn">레시피 생성</button>
    
    <h1 id="name">레시피 이름</h1>
    <p id="ingredients">재료</p>
    <div id="process">조리 과정</div>

    <script>
      const API_KEY ="발급받은 API KEY를 입력하세요";

      const info = `
        버터떡은 찹쌀가루와 타피오카 전분을 베이스로 버터를 듬뿍 넣어 오븐에 구워내기 때문에, 프랑스 디저트인 까눌레처럼 겉은 바삭하고 속은 쫄깃한 이른바 '겉바속쫀'의 식감을 완벽하게 구현하며 씹을수록 입안 가득 퍼지는 고소하고 진한 버터의 풍미와 달콤함이 특징입니다.
      `
      const json = 
      {
        name: "dessert_recipe",
        schema: {
          type: "object",
          properties: {
            name: {
              type: "string",
              description: "레시피의 이름을 알려줘",
            },
            ingredients: {
              type: "array",
              description: "필요한 재료를 알려줘.",
              items: {
                type: "string",
                description: "재료 이름",
              },
            },
            process: {
              type: "array",
              description: "레시피의 조리 과정을 알려줘.",
              items: {
                type: "string",
                description:
                  "조리 단계 앞에 숫자로 단계 번호를 붙여서 알려줘. 예시) 1. 재료 준비하기 2. ...",
              },
            },
          },
          required: ["name", "ingredients", "process"],
          additionalProperties: false,
        },
        strict: true,
      };

      async function generateRecipe() {
        try {
          const response = await fetch("https://api.openai.com/v1/chat/completions", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${API_KEY}`,
            },
            body: JSON.stringify({
              model: "gpt-5.4-mini",
              messages: [
                { role: "system", content: "너는 트렌디한 디저트 전문가야. 재료 준비부터 조리까지 모든 과정을 상세히 알려줘." },
                {
                  role: "user",
                  content: `겉바속쫀한 버터떡 레시피를 알려줘. 버터떡에 대한 정보는 다음과 같아: ${info}`,
                },
              ],
              response_format: {
                type: "json_schema",
                json_schema: json,
              },
            }),
          });

          const getData = await response.json();

          const recipe = getData.choices[0].message.content;
          const recipeJson = JSON.parse(recipe);

          const formattedIngredients = recipeJson.ingredients.join(',\n');

          console.log(JSON.stringify(recipeJson, null, 2));
          
          document.getElementById("name").innerText = recipeJson.name;
          document.getElementById("ingredients").innerText = recipeJson.ingredients;
          document.getElementById("process").innerText = recipeJson.process.join('\n');
          
        } catch (error) {
          console.error("오류:", error);
        }
      }

      document.getElementById("recipeBtn").addEventListener("click", generateRecipe);
    </script>
  </body>
</html>
