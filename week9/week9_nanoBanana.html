<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini API 이미지 생성 실습</title>
</head>
<body>
    <button id="generateBtn">이미지 생성하기</button>
    <img id="resultImg" style="max-width: 500px;"">

    <script>
        const API_KEY = "발급받은 API KEY를 입력하세요"; 
        const model = "gemini-3.1-flash-image-preview";
        const URL = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${API_KEY}`;

        async function generateImage() {
            try {
                const response = await fetch(URL, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({
                        contents: [
                            {
                                parts: [{ text: "우주복을 입고 달 위를 걷는 귀여운 고양이, 3D 픽사 애니메이션 스타일" }]
                            }
                        ],
                        generation_config: {
                            response_modalities: ["IMAGE"],
                            image_config: {
                                aspect_ratio: "4:3",
                                image_size: "512"
                            }
                        }
                    })
                });
                const data = await response.json();
                const imgData = data.candidates[0].content.parts[0].inlineData;
                
                document.getElementById("resultImg").src = `data:${imgData.mimeType};base64,${imgData.data}`;
            } catch (error) {
                console.error("오류:", error);
            }
        }
        document.getElementById("generateBtn").addEventListener("click", generateImage);
</script>
</body>
</html>
