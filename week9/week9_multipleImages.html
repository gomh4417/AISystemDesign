<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini API 이미지 생성 실습</title>
</head>
<body>
    
    <div>
        <label>입력 1</label>
        <input type="file" id="firstInput" accept="image/*">
    </div>
    <br>
    <div>
        <label>입력 2</label>
        <input type="file" id="secondInput" accept="image/*">
    </div>
    <br>
    <div>
        <label>입력 3</label>
        <input type="text" id="promptInput" placeholder="예: 여성 모델에게 파란색 꽃무늬 드레스를 입혀줘" style="width: 400px;">
    </div>
    <br>
    <button id="generateBtn">이미지 생성</button>
    <img id="resultImg" style="max-width: 500px; display: none;">

    <script>

        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.onerror = error => reject(error);
            });
        }

        async function generateGemini() {
            const firstFile = document.getElementById("firstInput").files[0];
            const secondFile = document.getElementById("secondInput").files[0];
            const promptText = document.getElementById("promptInput").value;
            const resultImg = document.getElementById("resultImg");

            try {
                const API_KEY = "발급받은 API KEY를 입력하세요"; 
                const model = "gemini-3.1-flash-image-preview";
                const URL = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${API_KEY}`;
                
                // 두 개의 이미지를 각각 Base64로 인코딩
                const firstBase64 = await fileToBase64(firstFile);
                const secondBase64 = await fileToBase64(secondFile);

                const response = await fetch(URL, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({
                        contents: [{ 
                            parts: [
                                { text: promptText }, 
                                { inline_data: { mime_type: firstFile.type, data: firstBase64 } },
                                { inline_data: { mime_type: secondFile.type, data: secondBase64 } }
                            ] 
                        }],
                        generation_config: {
                            response_modalities: ["IMAGE"] 
                        }
                    })
                });
                
                const data = await response.json();
                const imgData = data.candidates[0].content.parts[0].inlineData;
                const resultUrl = `data:${imgData.mimeType};base64,${imgData.data}`;

                resultImg.src = resultUrl;
                resultImg.style.display = "block";

            } catch (error) {
                console.error("오류:", error);
            }
        }

        document.getElementById("generateBtn").addEventListener("click", generateGemini);
</script>
</body>
</html>
